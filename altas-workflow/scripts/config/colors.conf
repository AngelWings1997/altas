# 颜色配置文件
# 用于 learning-stats.sh 脚本的终端输出样式

# 基础颜色
RED='\033[0;31m'
GREEN='\033[0;32m'
YELLOW='\033[1;33m'
BLUE='\033[0;34m'
MAGENTA='\033[0;35m'
CYAN='\033[0;36m'
NC='\033[0m'

# 边框样式
BORDER_HORIZONTAL="══════════════════════════════════════════"
BORDER_VERTICAL="║"
BORDER_CORNER_TOP_LEFT="╔"
BORDER_CORNER_TOP_RIGHT="╗"
BORDER_CORNER_BOTTOM_LEFT="╚"
BORDER_CORNER_BOTTOM_RIGHT="╝"

# 分隔线样式
SEPARATOR_LINE="━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
SEPARATOR_DASH="─────────────────────────"

# 状态图标
