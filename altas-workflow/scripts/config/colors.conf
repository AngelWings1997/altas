ICON_PENDING="⏳"
ICON_IN_PROGRESS="🔄"
ICON_RESOLVED="✔️"
ICON_PROMOTED="⬆️"
ICON_SKILL="🎯"
ICON_AREA="🗺️"
ICON_PRIORITY="🎯"
ICON_TYPE="📁"
ICON_TRENDS="📉"
